name: Build vibe-remote.exe

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      with_ui:
        description: 'Include Web UI (setup wizard)'
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Build Web UI
        run: |
          cd ui
          npm install
          npm run build

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install .

      - name: Generate version file
        run: |
          if (!(Test-Path "vibe/_version.py")) {
            echo '__version__ = "0.0.0+ci"' > "vibe/_version.py"
            Write-Host "Generated stub vibe/_version.py"
          }

      - name: Build exe with PyInstaller
        run: |
          python -m PyInstaller vibe-remote.spec --clean --noconfirm

      - name: Generate tag name
        id: tag
        shell: bash
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          TIMESTAMP=$(date +%Y%m%d-%H%M)
          echo "tag=build-${TIMESTAMP}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Upload exe to Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "vibe-remote.exe (${{ steps.tag.outputs.tag }})"
          body: "Automated Windows exe build from commit ${{ github.sha }}."
          files: dist/vibe-remote.exe
          prerelease: true
